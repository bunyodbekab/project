<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div id="viewport">
    <div id="rotator">
      <div id="app">
        <div id="adminPageContainer">
          <!-- HEADER -->
          <div class="admin-header">
            <div class="admin-title-section">
              <p class="eyebrow">Admin panel</p>
              <h1>Sozlamalar</h1>
            </div>
            <div class="admin-header-info">
              <span id="totalEarned" class="earn-info"></span>
              <button id="adminClose" type="button" class="ghost-btn margin-left">Yopish</button>
            </div>
          </div>

          <!-- MAIN CONTENT -->
          <div class="admin-content">
            <!-- Settings Section -->
            <div class="settings-panel">
              <div class="settings-row">
                <label class="field compact">
                  <span class="field-label">PIN</span>
                  <input id="adminPin" type="password" maxlength="6" autocomplete="off" />
                </label>
                <label class="field compact">
                  <span class="field-label">PIN 2</span>
                  <input id="adminPin2" type="password" maxlength="6" autocomplete="off" />
                </label>
                <label class="field compact switch-field">
                  <span class="field-label">Iconlar</span>
                  <input id="toggleIcons" type="checkbox" checked />
                </label>
                <label class="field compact">
                  <span class="field-label">Tekin pauza (s)</span>
                  <input id="freePause" type="number" min="0" value="5" />
                </label>
                <label class="field compact">
                  <span class="field-label">Pauza 5000 so'm (s)</span>
                  <input id="paidPause" type="number" min="1" value="120" />
                </label>
              </div>

              <div class="settings-row">
                <label class="field compact">
                  <span class="field-label">Bonus %</span>
                  <input id="bonusPercent" type="number" min="0" value="0" />
                </label>
                <label class="field compact">
                  <span class="field-label">Bonus threshold (so'm)</span>
                  <input id="bonusThreshold" type="number" min="0" value="0" />
                </label>
              </div>
            </div>

            <!-- Services List Header -->
            <div class="services-panel">
              <div class="services-header">
                <h2>Xizmatlar</h2>
              </div>
              
              <!-- Services Table -->
              <div class="services-table">
                <div class="services-table-header">
                  <div class="col-nomi">Nomi</div>
                  <div class="col-icon">Icon</div>
                  <div class="col-vaqt">Vaqt (s)</div>
                  <div class="col-faol">Faol</div>
                </div>
                <div id="serviceConfigList" class="services-table-body"></div>
              </div>
            </div>
          </div>

          <!-- VIRTUAL KEYBOARD -->
          <div class="admin-keyboard">
            <div class="keyboard-label">Virtual klaviatura</div>
            <div class="keyboard-display" id="keyboardDisplay">PIN: ○○○○○○</div>
            <div class="keyboard-rows">
              <div class="keyboard-row">
                <button type="button" class="kbd-key" data-key="1">1</button>
                <button type="button" class="kbd-key" data-key="2">2</button>
                <button type="button" class="kbd-key" data-key="3">3</button>
                <button type="button" class="kbd-key" data-key="4">4</button>
                <button type="button" class="kbd-key" data-key="5">5</button>
                <button type="button" class="kbd-key" data-key="6">6</button>
                <button type="button" class="kbd-key" data-key="7">7</button>
                <button type="button" class="kbd-key" data-key="8">8</button>
                <button type="button" class="kbd-key" data-key="9">9</button>
                <button type="button" class="kbd-key" data-key="0">0</button>
                <button type="button" class="kbd-key kbd-wide" data-key="BACKSPACE">←</button>
                <button type="button" class="kbd-key kbd-clear" data-key="CLEAR">Clear</button>
              </div>
              <div class="keyboard-row">
                <button type="button" class="kbd-key" data-key="Q">Q</button>
                <button type="button" class="kbd-key" data-key="W">W</button>
                <button type="button" class="kbd-key" data-key="E">E</button>
                <button type="button" class="kbd-key" data-key="R">R</button>
                <button type="button" class="kbd-key" data-key="T">T</button>
                <button type="button" class="kbd-key" data-key="Y">Y</button>
                <button type="button" class="kbd-key" data-key="U">U</button>
                <button type="button" class="kbd-key" data-key="I">I</button>
                <button type="button" class="kbd-key" data-key="O">O</button>
                <button type="button" class="kbd-key" data-key="P">P</button>
              </div>
              <div class="keyboard-row">
                <button type="button" class="kbd-key" data-key="A">A</button>
                <button type="button" class="kbd-key" data-key="S">S</button>
                <button type="button" class="kbd-key" data-key="D">D</button>
                <button type="button" class="kbd-key" data-key="F">F</button>
                <button type="button" class="kbd-key" data-key="G">G</button>
                <button type="button" class="kbd-key" data-key="H">H</button>
                <button type="button" class="kbd-key" data-key="J">J</button>
                <button type="button" class="kbd-key" data-key="K">K</button>
                <button type="button" class="kbd-key" data-key="L">L</button>
              </div>
              <div class="keyboard-row">
                <button type="button" class="kbd-key" data-key="Z">Z</button>
                <button type="button" class="kbd-key" data-key="X">X</button>
                <button type="button" class="kbd-key" data-key="C">C</button>
                <button type="button" class="kbd-key" data-key="V">V</button>
                <button type="button" class="kbd-key" data-key="B">B</button>
                <button type="button" class="kbd-key" data-key="N">N</button>
                <button type="button" class="kbd-key" data-key="M">M</button>
                <button type="button" class="kbd-key kbd-wide" data-key="SPACE">Bo'shliq</button>
              </div>
            </div>
          </div>

          <!-- FOOTER -->
          <div class="admin-footer">
            <span id="adminStatus" class="form-note"></span>
            <div class="footer-actions">
              <button id="resetDefaults" type="button" class="ghost-btn margin-right">Standartga qaytarish</button>
              <button id="adminSave" type="button" class="primary-btn">Saqlash</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
