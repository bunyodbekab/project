<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moyka Panel</title>
  <link rel="stylesheet" href="style.css" />
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
  <div id="viewport">
    <div id="rotator" >
      <div id="app" style="transform: scale(0.9);">
        <section id="topPanel" class="top-panel"  style="margin-top: 50px;">
          <div id="headerTitle" class="header-title"></div>
          <div id="headerMain" class="header-main"></div>
        </section>

        <div class="divider"></div>

        <section id="controlsWrap" class="controls-wrap" >
          <div id="serviceGrid" class="service-grid"></div>

          <button id="pauseButton" class="pause-button" type="button">
            <img id="pauseIconLeft" class="stop-mark-img" alt="stop" />
            <div class="pause-label">
              <span class="pause-text">PAUZA</span>
              <span id="pauseSub" class="pause-sub"></span>
            </div>
            <img id="pauseIconRight" class="stop-mark-img" alt="stop" />
          </button>
        </section>
      </div>
    </div>
  </div>

  <div id="modalHost">
    <div id="pinModal" class="modal" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <div class="modal-title-wrap">
            <p class="eyebrow">Admin</p>
            <h2>PIN kiriting</h2>
          </div>
          <button id="pinClose" type="button" class="ghost-btn">Bekor qilish</button>
        </div>
        <div class="modal-body">
          <div id="pinDisplay" class="pin-display">
            <span id="pinDots" class="pin-dots">• • • • • •</span>
          </div>
          <p id="pinError" class="form-error" role="alert"></p>
          
          <div class="pin-keypad">
            <button class="pin-key" data-key="1">1</button>
            <button class="pin-key" data-key="2">2</button>
            <button class="pin-key" data-key="3">3</button>
            <button class="pin-key" data-key="4">4</button>
            <button class="pin-key" data-key="5">5</button>
            <button class="pin-key" data-key="6">6</button>
            <button class="pin-key" data-key="7">7</button>
            <button class="pin-key" data-key="8">8</button>
            <button class="pin-key" data-key="9">9</button>
            <button class="pin-key pin-key-wide" data-key="0">0</button>
          </div>
        </div>
        <div class="modal-actions">
          <button id="pinClear" type="button" class="ghost-btn">O'chirish</button>
          <button id="pinSubmit" type="button" class="primary-btn">Kirish</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
